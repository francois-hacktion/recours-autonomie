  - niveau: institution
    ref: "agirc-arrco.fr — Accompagnement et prévention (action sociale) (consulté 17/06/2026) — https://www.agirc-arrco.fr/particuliers/mes-services-particuliers/accompagnement-et-prevention/"
  - niveau: institution
    ref: "pour-les-personnes-agees.gouv.fr — L'aide à domicile momentanée pour les retraités Agirc-Arrco (consulté 17/06/2026) — https://www.pour-les-personnes-agees.gouv.fr/vivre-a-domicile/aides-financieres/l-aide-a-domicile-momentanee-pour-les-retraites-agirc-arrco"
