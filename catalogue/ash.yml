  - niveau: institution
    ref: "pour-les-personnes-agees.gouv.fr — L'aide sociale à l'hébergement (ASH) en établissement (consulté 17/06/2026) — https://www.pour-les-personnes-agees.gouv.fr/vivre-dans-un-ehpad/aides-financieres-en-ehpad/l-aide-sociale-a-l-hebergement-ash-en-etablissement"
  - niveau: institution
    ref: "solidarites.gouv.fr — Aide sociale à l'hébergement (ASH) (consulté 17/06/2026) — https://solidarites.gouv.fr/aide-sociale-lhebergement-ash"
